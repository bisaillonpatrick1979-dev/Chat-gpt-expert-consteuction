<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <title>ChatGPT Experts Construction</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07101f;
      color: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .35), transparent 38%),
        linear-gradient(145deg, #07101f 0%, #111827 55%, #172033 100%);
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 28px;
      background: rgba(15, 23, 42, .78);
      box-shadow: 0 28px 80px rgba(0, 0, 0, .42);
      backdrop-filter: blur(16px);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(37, 99, 235, .16);
      border: 1px solid rgba(96, 165, 250, .35);
      color: #bfdbfe;
      font-weight: 700;
      letter-spacing: .02em;
    }
    h1 {
      margin: 22px 0 14px;
      font-size: clamp(2.25rem, 8vw, 4.5rem);
      line-height: .98;
      letter-spacing: -.055em;
    }
    p {
      margin: 0;
      max-width: 620px;
      color: #cbd5e1;
      font-size: clamp(1.05rem, 2.8vw, 1.35rem);
      line-height: 1.6;
    }
    .status {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(148, 163, 184, .18);
      color: #86efac;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <span class="badge">Nouveau projet ChatGPT</span>
    <h1>Experts Construction</h1>
    <p>Base indépendante pour construire ensemble un assistant spécialisé en construction, revêtement extérieur, mesures, plans de coupe, estimation et gestion de chantier.</p>
    <div class="status">Projet initialisé — prêt pour la prochaine étape.</div>
  </main>
</body>
</html>
